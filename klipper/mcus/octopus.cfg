[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_380018000751313133353932-if00
restart_method: command
##--------------------------------------------------------------------

# All mainboard wiring is named below: the [board_pins] aliases cover every pin
# used by outputs/ and features/, so swapping the mainboard only requires
# re-pointing the right-hand side of these aliases (plus the serial/canbus id).
[board_pins mainboard_pins]
aliases:
    # Stepper driver sockets, named MOTOR0..MOTOR5 to match the board silkscreen.
    # MOTOR0/MOTOR1 carry TMC5160 drivers (SPI); MOTOR2..MOTOR5 carry TMC2209 (UART).
    MOTOR0_STEP=PF13, MOTOR0_DIR=PF12, MOTOR0_ENABLE=PF14, MOTOR0_CS=PC4,
    MOTOR1_STEP=PG0,  MOTOR1_DIR=PG1,  MOTOR1_ENABLE=PF15, MOTOR1_CS=PD11,
    TMC_SPI_MOSI=PA7, TMC_SPI_MISO=PA6, TMC_SPI_SCLK=PA5,
    MOTOR2_STEP=PF11, MOTOR2_DIR=PG3,  MOTOR2_ENABLE=PG5,  MOTOR2_UART=PC6,
    MOTOR3_STEP=PG4,  MOTOR3_DIR=PC1,  MOTOR3_ENABLE=PA0,  MOTOR3_UART=PC7,
    MOTOR4_STEP=PF9,  MOTOR4_DIR=PF10, MOTOR4_ENABLE=PG2,  MOTOR4_UART=PF2,
    MOTOR5_STEP=PC13, MOTOR5_DIR=PF0,  MOTOR5_ENABLE=PF1,  MOTOR5_UART=PE4,
    # Driver DIAG / endstop pins (DIAGn aligns with the MOTORn socket of the same number)
    DIAG0=PG6,  DIAG1=PG9,  DIAG3=PG11, DIAG7=PG15,
    # Bed heater + thermistors (BED_SENSOR = TB port, T0 = thermistor port 0)
    BED_HEATER=PA3, BED_SENSOR=PF3, T0=PF4,
    # Fans
    CONTROLLER_FAN1=PA8, CONTROLLER_FAN2=PE5, CONTROLLER_FAN3=PD12, ELECTRONICS_FAN=PD13,
    BED_FAN=PD15,
    # Lighting
    CHAMBER_LED=PB10

[temperature_sensor mainboard]
sensor_type: temperature_mcu
sensor_mcu: mcu
