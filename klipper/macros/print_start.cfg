
[gcode_macro PRINT_START]
#   Use PRINT_START for the slicer starting script - please customise for your slicer of choice
gcode:

    # Parameters
    {% set bed_temp = params.BED|default(0)|int %}
    {% set extruder_temp = params.EXTRUDER|default(0)|int %}
    {% set chamber_temp = params.CHAMBER|default(0)|int %}
    {% set bed_type = params.BED_TYPE|default("Smooth PEI") %}

    {% set config = printer["gcode_macro _Configuration"] %}
    {% set use_touch = config.cartographer_touch == 'true' and printer.configfile.settings['cartographer touch_model default'] %}
    {% set probe_temp = extruder_temp if extruder_temp < config.probe_temp or not use_touch else config.probe_temp %}

    {% if bed_temp < 20 %}
      _NOTIFY T="Requested bed temperature too low (requested {bed_temp}, minimum: 20)"
      M112 # EStop!
    {% endif %}

    {% if extruder_temp < 20 %}
      _NOTIFY T="Requested extruder temperature too low (requested {extruder_temp}, minimum: 20)"
      M112 # EStop!
    {% endif %}

    {% if not printer['filament_switch_sensor filament_present'].filament_detected %}
      _NOTIFY T="No filament present, install filament before attempting to print."
      M112 # EStop!
    {% endif %}

    # Turn the lights on with a short timeout so they don't stay on forever if
    # homing fails before we get a chance to start the print.
    LIGHTS
    LIGHTS_OFF_AFTER SECONDS=300

    # Start pre-heating the bed while we perform initial homing
    M140 S{bed_temp}
    M141 S{chamber_temp}
    M104 S{probe_temp}

    ############################
    # Perform homing #
    ############################
    _NOTIFY T="Homing"
    SET_GCODE_OFFSET Z=0
    _ENSURE_HOMED

    # Set absolute positioning for XYZ
    G90

    ########################
    # Pre-Clean The Nozzle #
    ########################
    {% if use_touch %}
      # CLEAN_NOZZLE is fiddly and edited often, so keep the pre-clean guarded by
      # a timeout: if a bad edit makes it error out before the print starts, the
      # lights still turn off rather than staying on indefinitely.
      LIGHTS_OFF_AFTER SECONDS=600
      _NOTIFY T="Pre-Cleaning Nozzle"
      {% set pre_clean_temp = extruder_temp - 60 if extruder_temp - 60 > probe_temp else probe_temp %}
      M104 S{pre_clean_temp}
      PARK_NOZZLE
      M109 S{pre_clean_temp}
      M106 S255 # Turn on the part cooling fan to reduce ooze
      CLEAN_NOZZLE TEMP={pre_clean_temp} PURGE=false
      M109 S{probe_temp} # Drop the temperature back down to the probe temp to stop ooze
      CLEAN_NOZZLE TEMP={probe_temp} PURGE=false # Do a second clean at the probe temp to ensure the nozzle is clean for probing
      M106 S0 # Turn off the part cooling fan after cleaning
    {% endif %}

    # Bed and chamber heat-up are open-ended waits (chamber heating can take up to
    # an hour), so they run with NO timeout. This LIGHTS is load-bearing: besides
    # keeping the lights on it CANCELS the still-pending pre-clean/homing timeout
    # (it ends in UPDATE_DELAYED_GCODE ID=lights_off DURATION=0). Without it the
    # previous timer would keep counting down into the heating waits. (It couldn't
    # actually fire while PRINT_START holds the g-code mutex, but we clear it so
    # nothing is left armed - don't drop this call when editing.)
    LIGHTS

    #######################
    #  Wait for Heating   #
    #######################
    {% if printer['heater_bed'].temperature < bed_temp %}
      # No lights timeout while heating (see the heating-waits note above).
      M104 S0
      PARK_NOZZLE
      _NOTIFY T="Heating Bed"
      M190 S{bed_temp}
    {% endif %}

    #####################
    # Heat the chamber  #
    #####################
    # Now wait for the chamber to reach the desired operating temperature
    {% if printer['temperature_sensor chamber'].temperature < chamber_temp %}
      # No lights timeout while heating (see the heating-waits note above).
      M104 S0
      PARK_NOZZLE
      _NOTIFY T="Heating Chamber"
      M191 S{chamber_temp}
    {% endif %}

    # Past the heating waits, the remaining work (gantry leveling, Z-offset,
    # meshing, priming) is bounded and aborts cleanly on failure, so re-arm a
    # reasonable timeout: if one of these steps errors out before PRINT_START
    # reaches the closing LIGHTS, this turns the lights off rather than leaving
    # them on indefinitely. It only needs to outlast the work it covers.
    LIGHTS_OFF_AFTER SECONDS=900

    # Pass through the material information to the MPC controller
    _SET_MPC_MATERIAL MATERIAL={params.MATERIAL}

    # Heat the nozzle to probing temperature
    M104 S{probe_temp}

    ############################
    # Perform gantry levelling #
    ############################
    _NOTIFY T="Gantry Leveling"
    QUAD_GANTRY_LEVEL

    ##########################
    #  Z-Offset Calibration  #
    ##########################
    {% if use_touch %}
      # Move to the center of the bed and run probe calibration
      _NOTIFY T="Calibrating z-offset"
      CENTER HEIGHT={config.travel_clearance}
      M109 S{probe_temp}
      TEMPERATURE_WAIT SENSOR=extruder MINIMUM={probe_temp-2} MAXIMUM={probe_temp}
      CARTOGRAPHER_TOUCH_HOME EXPERIMENTAL_RANDOM_RADIUS=5
    {% else %}
      SET_Z_OFFSET_FOR_TEMP TEMP={extruder_temp}
    {% endif %}

    ## Bring the nozzle up to print temperature
    M104 S{extruder_temp}

    #################
    #  Bed Meshing  #
    #################
    _NOTIFY T="Meshing"
    G0 Z{config.cartographer_reset_height} F{config.travel_speed}
    BED_MESH_CALIBRATE ADAPTIVE=1

    # Enable the filament sensor and set absolute positioning for the extruder
    FILAMENT_SENSOR_ENABLE
    G92 E0

    _NOTIFY T="Priming"
    # Run a purge to ensure the nozzle is primed
    PRIME TEMP={extruder_temp}

    # Move to the center of the bed and load the skew profile
    {% if config.skew_profile %}
      _NOTIFY T="Loading Skew Profile '{config.skew_profile}'"
      # These XYZ moves are likely superfluous
      CENTER HEIGHT={config.prime_clearance}
      SKEW_PROFILE LOAD={config.skew_profile}
    {% endif %}

    # Ensure the lights don't turn off during the print
    # (they would usually time-out if there's an issue during pre-print setup)
    LIGHTS

    G90
    _NOTIFY T="Printing"
